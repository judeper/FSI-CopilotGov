# === FEDERAL REGISTER API CONFIGURATION ===
# Configuration for the Federal Register API source adapter.
# These settings control which agencies and document types are monitored.
federal_register:
  # Agencies to monitor (Federal Register API slug format).
  # Add new agencies by finding their slug on federalregister.gov.
  # Common FSI agencies are listed below.
  agencies:
    - slug: securities-and-exchange-commission
      short_name: SEC
    - slug: commodity-futures-trading-commission
      short_name: CFTC
    - slug: comptroller-of-the-currency
      short_name: OCC
    - slug: federal-reserve-system
      short_name: "Federal Reserve"

  # Document types to monitor.
  # - RULE: Final rules
  # - PRORULE: Proposed rules
  # - NOTICE: Notices
  document_types:
    - RULE
    - PRORULE
    - NOTICE


# === OPERATIONAL SETTINGS ===
# These settings control HTTP request behavior and output formatting.
# Adjust these if you experience timeouts or rate limiting.
operational:
  # HTTP request settings
  request_timeout: 30          # Timeout in seconds for HTTP requests
  max_retries: 3               # Number of retry attempts for failed requests
  request_delay: 1.0           # Seconds between requests (rate limiting)

  # Diff output settings
  max_diff_lines: 100          # Truncate diffs longer than this many lines
