# FSI-CopilotGov Monitoring Configuration
# =======================================
#
# This file controls classification patterns for the Learn Monitor and Regulatory Monitor.
# Non-developers can adjust monitoring sensitivity by editing patterns in this file.
#
# PATTERN SYNTAX: All patterns use Python regex syntax.
# - \b matches a word boundary (start/end of word)
# - \s matches whitespace (spaces, tabs)
# - | means OR (matches either pattern)
# - (?:...) groups patterns without capturing
# - [34] matches either 3 or 4
#
# CLASSIFICATION ORDER: Patterns are checked in order:
#   CRITICAL -> HIGH -> NOISE -> MEDIUM (default)
#
# The first matching pattern determines classification. If no patterns match,
# the item is classified as MEDIUM by default.
#
# ==========================================================================

# === LEARN MONITOR CLASSIFICATION PATTERNS ===
# These patterns are used to classify changes detected in Microsoft Learn documentation.
# The Learn Monitor checks for documentation changes that may require updates to
# FSI-CopilotGov playbooks and controls.
learn:
  # CRITICAL patterns require immediate action.
  # These indicate UI navigation steps changed, deprecation notices, or breaking changes.
  # If a CRITICAL change is detected, the portal-walkthrough.md playbooks may need updating.
  critical_patterns:
    - pattern: '\d+\.\s+(click|select|go to|navigate)'
      reason: "UI navigation steps changed"
    - pattern: '(deprecated|removed|no longer|retired)'
      reason: "Deprecation notice"
    - pattern: '(breaking change|migration required)'
      reason: "Breaking changes"

  # HIGH patterns require review.
  # These indicate portal references, UI elements, or policy language changes.
  high_patterns:
    - pattern: '(Admin center|portal|Power Platform|Purview)'
      reason: "Portal references"
    - pattern: '(button|menu|tab|panel|dialog|blade)'
      reason: "UI element names"
    - pattern: '(Important|Warning|Note|Caution):'
      reason: "Policy callout blocks"
    - pattern: '(required|must|should not|prohibited)'
      reason: "Policy language"
    - pattern: '(compliance|audit|retention|DLP)'
      reason: "Compliance features"
    - pattern: '(preview|GA|generally available)'
      reason: "Feature availability"

  # NOISE patterns are metadata/formatting changes (skip).
  # These are typically not relevant to FSI-CopilotGov documentation updates.
  noise_patterns:
    - pattern: '^[-+]\s*$'
      reason: "Empty diff lines"
    - pattern: 'ms\.(date|author|reviewer|topic)'
      reason: "Metadata fields"
    - pattern: '(Article|Contributor|Feedback)'
      reason: "Page chrome elements"
    - pattern: '^[+-]\s*(Table of contents|Read in English|Add to Plans?|Copy Markdown|Print)\s*$'
      reason: "Learn command-bar chrome labels"


# === REGULATORY MONITOR CLASSIFICATION PATTERNS ===
# These patterns are used to classify regulatory items from Federal Register and FINRA.
# The Regulatory Monitor checks for new regulations that may require framework updates.
regulatory:
  # CRITICAL patterns: Direct AI agent/copilot mentions in regulatory context.
  # These regulatory items directly mention AI agents, copilot, or automated advice
  # and require immediate review for framework impact.
  critical_patterns:
    - pattern: '\bai\s+agent'
      reason: "Directly mentions AI agents"
    - pattern: '\bagent\s+ai'
      reason: "Directly mentions agent AI"
    - pattern: '\bcopilot'
      reason: "Directly mentions copilot"
    - pattern: '\bautomated\s+advice'
      reason: "Automated advice regulation"
    - pattern: '\bautomated\s+investment\s+advice'
      reason: "Automated investment advice"
    - pattern: '\brobo-advisor'
      reason: "Robo-advisor regulation"
    - pattern: '\brobo\s+advisor'
      reason: "Robo advisor regulation"

  # HIGH patterns: AI/ML terms + FSI-specific requirements.
  # These reference AI, machine learning, or automation in FSI regulatory context.
  high_patterns:
    - pattern: '\bartificial\s+intelligence'
      reason: "References artificial intelligence"
    - pattern: '\bgenai\b'
      reason: "References GenAI terminology"
    - pattern: '\bmachine\s+learning'
      reason: "References machine learning"
    - pattern: '\bllm\b'
      reason: "References large language models"
    - pattern: '\bgenerative\s+ai'
      reason: "References generative AI"
    - pattern: '\bfinra\s+rule\s*2210\b'
      reason: "FINRA Rule 2210 (communications with the public)"
    - pattern: '\bcommunications?\s+with\s+the\s+public\b'
      reason: "FINRA communications with the public language"
    - pattern: '\b(?:finra\b.{0,80}\bretail\s+communications?\b|retail\s+communications?\b.{0,80}\bfinra\b)'
      reason: "Retail communications language in FINRA context"
    - pattern: '\bproject(?:ed|ion)\s+performance\b'
      reason: "Projected performance language"
    - pattern: '\btarget(?:ed)?\s+returns?\b'
      reason: "Targeted return language"
    - pattern: '\bchatbot'
      reason: "References chatbots"
    - pattern: '\bautomation'
      reason: "References automation in FSI context"
    - pattern: '\bsupervision.*(?:electronic|automated|technology)'
      reason: "Supervision of automated systems"
    - pattern: '\bfinra\s+3110'
      reason: "FINRA 3110 (supervision)"
    - pattern: '\bfinra\s+4511'
      reason: "FINRA 4511 (recordkeeping)"
    - pattern: '\bsec\s+17a-[34]'
      reason: "SEC 17a-3 or 17a-4 (recordkeeping)"
    - pattern: '\brecordkeeping.*(?:electronic|automated)'
      reason: "Electronic recordkeeping"
    - pattern: '\bmodel\s+risk\s+management'
      reason: "Model risk management"

  # MEDIUM patterns: General FSI regulations that may indirectly affect AI agents.
  # These are general FSI regulations that could have indirect impact on AI agent deployments.
  medium_patterns:
    - pattern: '\bregulatory\s+notice\s+\d{2}-\d{2}\b'
      reason: "FINRA regulatory notice identifier"
    - pattern: '\bbroker-dealer'
      reason: "Broker-dealer regulation"
    - pattern: '\binvestment\s+adviser'
      reason: "Investment adviser regulation"
    - pattern: '\bcustomer\s+communication'
      reason: "Customer communication rules"
    - pattern: '\bcybersecurity'
      reason: "Cybersecurity requirements"
    - pattern: '\bdata\s+protection'
      reason: "Data protection requirements"
    - pattern: '\bprivacy'
      reason: "Privacy requirements"
    - pattern: '\bcompliance\s+program'
      reason: "Compliance program requirements"
    - pattern: '\baudit\s+trail'
      reason: "Audit trail requirements"
    - pattern: '\binformation\s+barrier'
      reason: "Information barriers"


# === KEYWORD-TO-CONTROL MAPPING ===
# Maps regulatory keywords to affected FSI-CopilotGov controls.
# When a regulatory item contains a keyword, the listed controls may need review.
#
# Format:
#   - keyword: "keyword phrase"
#     controls:
#       - id: "X.Y"           # Control ID (e.g., "1.3", "2.12")
#         name: "Control Name" # Human-readable control name
#
# To add a new keyword mapping:
#   1. Add a new entry with the keyword phrase (lowercase)
#   2. List all controls that might be affected by changes related to that keyword
#   3. Refer to docs/controls/CONTROL-INDEX.md for the full control catalog
keyword_control_map:
  - keyword: supervision
    controls:
      - id: "3.6"
        name: "Control 3.6: Supervision and Oversight (FINRA Rule 3110 / SEC Reg BI)"
