name: Regulatory Monitor

on:
  schedule:
    # Daily at 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/regulatory_monitor.py'
      - 'scripts/monitoring_shared.py'
      - '.github/workflows/regulatory-monitoring.yml'
      - 'scripts/requirements.txt'

# Serialize same-workflow runs so cleanup of prior PRs doesn't race a
# concurrent run that just opened a newer PR (see #48).
concurrency:
  group: regulatory-monitor
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write  # required for `gh pr comment` (PR comments are issue comments)

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Regulatory Monitor (PR smoke, dry-run)
        if: github.event_name == 'pull_request'
        run: python scripts/regulatory_monitor.py --dry-run

      - name: Run Regulatory Monitor (scheduled / manual)
        id: monitor
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          set +e
          python scripts/regulatory_monitor.py
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$EXIT_CODE" -eq 1 ]; then
            REPORT_FILE=$(ls -t reports/monitoring/regulatory-changes-*.md 2>/dev/null | head -1)
            if [ -n "$REPORT_FILE" ]; then
              echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Detect state changes
        if: github.event_name != 'pull_request'
        id: diff
        run: |
          if [ -n "$(git status --porcelain data/monitor-state.json reports/monitoring/ 2>/dev/null)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update PR with regulatory findings
        id: cpr
        if: github.event_name != 'pull_request' && steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Regulatory Monitor: new findings detected"
          branch: monitoring/regulatory-${{ github.run_number }}
          delete-branch: true
          base: main
          title: "Regulatory Monitor: new findings (${{ github.run_number }})"
          labels: |
            monitoring
            regulatory
            needs-review
            automated
          body: |
            ## Regulatory Monitor Report

            Automated daily scan of Federal Register (SEC, CFTC, OCC, Federal Reserve)
            and FINRA notices for AI- / FSI-relevant regulatory changes.

            - Report: `${{ steps.monitor.outputs.report_file }}`

            ### Classification tiers
            - 🔴 **CRITICAL** — Directly mentions AI agents, copilot, or automated advice
            - 🟠 **HIGH** — References AI/ML/automation or FSI-specific requirements
            - 🟡 **MEDIUM** — General FSI regulations (indirect AI impact)
            - ⚪ **NOISE** — No FSI governance relevance

            ### Review instructions
            1. Open the report for CRITICAL/HIGH items and affected-control keywords.
            2. Update controls/playbooks where a regulatory change requires it.
            3. Merge to update the monitoring baseline.

            ---
            *Automated PR created by `.github/workflows/regulatory-monitoring.yml`.*

      - name: Close prior superseded Regulatory Monitor PRs
        if: github.event_name != 'pull_request' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NEW_PR: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          set -uo pipefail
          # Identify our own monitor PRs by multiple invariants — labels alone
          # are too broad (humans can edit them). See issue #48.
          mapfile -t prior < <(gh pr list \
            --repo "$REPO" \
            --state open \
            --label regulatory \
            --label automated \
            --base main \
            --json number,headRefName,author,title \
            --jq ".[] |
              select(.number < ($NEW_PR | tonumber)) |
              select(.headRefName | startswith(\"monitoring/regulatory-\")) |
              select(.author.login == \"app/github-actions\" or .author.login == \"github-actions[bot]\") |
              select(.title | startswith(\"Regulatory Monitor:\")) |
              .number")

          if [ "${#prior[@]}" -eq 0 ]; then
            echo "No prior Regulatory Monitor PRs to supersede."
            exit 0
          fi

          echo "Superseding ${#prior[@]} prior Regulatory Monitor PR(s) with #${NEW_PR}..."
          for n in "${prior[@]}"; do
            [ -z "$n" ] && continue
            if ! gh pr comment "$n" --repo "$REPO" --body "Superseded by #${NEW_PR}. The dated report file remains reachable on this PR's branch until cleanup."; then
              echo "::warning::Failed to comment on PR #${n}"
            fi
            # Close without --delete-branch so dated reports stay reachable
            # for any future consolidation cleanup.
            if ! gh pr close "$n" --repo "$REPO"; then
              echo "::warning::Failed to close PR #${n}"
            fi
          done
