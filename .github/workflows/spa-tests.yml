name: SPA tests

on:
  pull_request:
    paths:
      - 'docs/javascripts/**'
      - 'tests/spa/**'
      - 'assessment/manifest/**'
      - 'assessment/data/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.mjs'
      - '.github/workflows/spa-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/javascripts/**'
      - 'tests/spa/**'
      - 'assessment/manifest/**'
      - 'assessment/data/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.mjs'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install -r scripts/requirements.txt
      - name: Generate assessment data (legacy JSON used by SPA loader)
        run: python scripts/extract_assessment_data.py
      - run: npm ci
      - run: npm test
