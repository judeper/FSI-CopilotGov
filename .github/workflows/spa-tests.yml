name: SPA tests

on:
  pull_request:
    paths:
      - 'docs/javascripts/**'
      - 'tests/spa/**'
      - 'assessment/manifest/**'
      - 'assessment/data/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.mjs'
      - '.github/workflows/spa-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/javascripts/**'
      - 'tests/spa/**'
      - 'assessment/manifest/**'
      - 'assessment/data/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.mjs'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
