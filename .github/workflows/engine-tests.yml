name: Engine tests

on:
  pull_request:
    paths:
      - 'assessment/engine/**'
      - 'assessment/manifest/**'
      - 'assessment/tests/**'
      - 'assessment/requirements.txt'
      - '.github/workflows/engine-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'assessment/engine/**'
      - 'assessment/manifest/**'
      - 'assessment/tests/**'
      - 'assessment/requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'assessment/requirements.txt'
      - name: Install dependencies
        run: |
          pip install -r assessment/requirements.txt
      - name: Run engine smoke tests
        run: pytest assessment/tests -v
