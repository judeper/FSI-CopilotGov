name: Engine tests

on:
  pull_request:
    paths:
      - 'assessment/engine/**'
      - 'assessment/manifest/**'
      - 'assessment/collectors/**'
      - 'assessment/tests/**'
      - 'scripts/test_collect_sentinel_copilotactivity.py'
      - 'scripts/verify_tuning_claims.py'
      - 'scripts/test_verify_tuning_claims.py'
      - 'assessment/requirements.txt'
      - '.github/workflows/engine-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'assessment/engine/**'
      - 'assessment/manifest/**'
      - 'assessment/collectors/**'
      - 'assessment/tests/**'
      - 'scripts/test_collect_sentinel_copilotactivity.py'
      - 'scripts/verify_tuning_claims.py'
      - 'scripts/test_verify_tuning_claims.py'
      - 'assessment/requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'assessment/requirements.txt'
      - name: Install dependencies
        run: |
          pip install -r assessment/requirements.txt
      - name: Verify PowerShell availability
        run: pwsh -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'
      - name: Run engine and collector tests
        run: pytest assessment/tests scripts/test_collect_sentinel_copilotactivity.py -v
      - name: Run Copilot Tuning Claims verifier unit tests
        run: pytest scripts/test_verify_tuning_claims.py -v
