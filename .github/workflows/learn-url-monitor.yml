name: Microsoft Learn URL Monitor

on:
  schedule:
    # Daily at 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/learn_monitor.py'
      - 'scripts/monitoring_shared.py'
      - 'docs/reference/microsoft-learn-urls.md'
      - '.github/workflows/learn-url-monitor.yml'
      - 'scripts/requirements.txt'

# Serialize same-workflow runs so cleanup of prior PRs doesn't race a
# concurrent run that just opened a newer PR (see #48).
concurrency:
  group: learn-url-monitor
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write  # required for `gh pr comment` (PR comments are issue comments)

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Learn Monitor (PR smoke, dry-run)
        if: github.event_name == 'pull_request'
        run: python scripts/learn_monitor.py --dry-run

      - name: Run Learn Monitor (scheduled / manual)
        id: monitor
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          set +e
          python scripts/learn_monitor.py
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$EXIT_CODE" -eq 1 ]; then
            REPORT_FILE=$(ls -t reports/monitoring/learn-changes-*.md 2>/dev/null | head -1)
            if [ -n "$REPORT_FILE" ]; then
              echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Detect state changes
        if: github.event_name != 'pull_request'
        id: diff
        run: |
          if [ -n "$(git status --porcelain data/monitor-state.json reports/monitoring/ 2>/dev/null)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App token
        id: app-token
        if: github.event_name != 'pull_request' && steps.diff.outputs.has_changes == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Open / update PR with state updates
        id: cpr
        if: github.event_name != 'pull_request' && steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Only ever stage monitoring artifacts so the PR cannot accidentally
          # carry customer-facing docs into the unattended auto-merge path.
          add-paths: |
            data/monitor-state.json
            data/monitor-state.json.backup
            reports/monitoring/*.md
          commit-message: "Learn Monitor: update Microsoft Learn URL tracking"
          branch: monitoring/learn-url-${{ github.run_number }}
          delete-branch: true
          base: main
          title: "Learn Monitor: Microsoft Learn documentation update (${{ github.run_number }})"
          labels: |
            monitoring
            documentation
            automated
            learn-watch
          body: |
            ## Microsoft Learn URL Monitor

            Automated daily check of Microsoft Learn URLs referenced by
            FSI-CopilotGov controls and playbooks.

            - Changes detected: `${{ steps.monitor.outputs.exit_code == '1' && 'yes' || 'no (daily baseline refresh)' }}`
            - Report: `${{ steps.monitor.outputs.report_file }}`

            ### Files modified
            - `data/monitor-state.json` — updated content hashes
            - `reports/monitoring/learn-changes-*.md` — change report (if changes detected)

            Review the report, verify affected controls/playbooks, then merge to update
            the baseline.

            ---
            *Automated PR created by `.github/workflows/learn-url-monitor.yml`.*

      - name: Close prior superseded Learn Monitor PRs
        if: github.event_name != 'pull_request' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NEW_PR: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          set -uo pipefail
          # Identify our own monitor PRs by multiple invariants — labels alone
          # are too broad (humans can edit them). See issue #48.
          mapfile -t prior < <(gh pr list \
            --repo "$REPO" \
            --state open \
            --label learn-watch \
            --base main \
            --json number,headRefName,author,title \
            --jq ".[] |
              select(.number < ($NEW_PR | tonumber)) |
              select(.headRefName | startswith(\"monitoring/learn-url-\")) |
              select(.author.login == \"app/fsi-monitor-bot\" or .author.login == \"app/github-actions\" or .author.login == \"github-actions[bot]\") |
              select(.title | startswith(\"Learn Monitor:\")) |
              .number")

          if [ "${#prior[@]}" -eq 0 ]; then
            echo "No prior Learn Monitor PRs to supersede."
            exit 0
          fi

          echo "Superseding ${#prior[@]} prior Learn Monitor PR(s) with #${NEW_PR}..."
          for n in "${prior[@]}"; do
            [ -z "$n" ] && continue
            if ! gh pr comment "$n" --repo "$REPO" --body "Superseded by #${NEW_PR}. The dated report file remains reachable on this PR's branch until cleanup."; then
              echo "::warning::Failed to comment on PR #${n}"
            fi
            # Close without --delete-branch so dated reports stay reachable
            # for any future consolidation cleanup.
            if ! gh pr close "$n" --repo "$REPO"; then
              echo "::warning::Failed to close PR #${n}"
            fi
          done

      # --- Stage 0: state-only auto-merge of the newest monitoring PR ---
      # Learn-monitor PRs only ever touch data/monitor-state.json(.backup),
      # data/monitor-pending/learn/*.json, and reports/monitoring/*.md (no
      # customer-facing docs — enforced by add-paths above). The newest run
      # carries the cumulative monitor-state.json baseline, so prior daily PRs
      # are superseded (closed above) and the newest is safe to auto-merge once
      # required checks pass. Mirrors FSI-AgentGov's learn-monitor.yml.
      - name: Enable auto-merge for the state-only PR
        # Kill-switch: set repo variable LEARN_STATE_AUTOMERGE to 'false' (or
        # unset) to disable unattended merging of monitoring PRs.
        if: github.event_name != 'pull_request' && steps.cpr.outputs.pull-request-number != '' && vars.LEARN_STATE_AUTOMERGE == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_PR: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          # Defense in depth: only auto-merge if EVERY changed file is a
          # monitoring artifact. Use the paginated REST API because
          # `gh pr view --json files` truncates at 100 files, so an extra file
          # beyond the first page could otherwise slip through undetected.
          # Fail CLOSED: if the file listing can't be obtained, skip auto-merge.
          FILES=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${NEW_PR}/files" --paginate --jq '.[].filename') || FILES=""
          if [ -z "$FILES" ]; then
            echo "::warning::Could not list files for PR #$NEW_PR (API error or empty); skipping auto-merge (manual review required)."
            gh pr edit "$NEW_PR" --add-label needs-review || true
            exit 0
          fi
          NON_STATE=$(printf '%s\n' "$FILES" \
            | grep -vcE '^data/monitor-state\.json(\.backup)?$|^reports/monitoring/.*\.md$' || true)
          if [ "${NON_STATE:-1}" != "0" ]; then
            echo "::warning::PR #$NEW_PR contains non-state file(s) (count=${NON_STATE:-unknown}); skipping auto-merge (manual review required)."
            gh pr edit "$NEW_PR" --add-label needs-review || true
            exit 0
          fi
          gh pr merge "$NEW_PR" --auto --squash --delete-branch
          echo "Auto-merge enabled for state-only PR #$NEW_PR (merges once required checks pass)."
