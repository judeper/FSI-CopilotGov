name: Microsoft Learn URL Monitor

on:
  schedule:
    # Weekly on Tuesday at 10:00 UTC
    - cron: '0 10 * * 2'
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/learn_monitor.py'
      - 'scripts/monitoring_shared.py'
      - 'docs/reference/microsoft-learn-urls.md'
      - '.github/workflows/learn-url-monitor.yml'
      - 'scripts/requirements.txt'

permissions:
  contents: write
  pull-requests: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Learn Monitor (PR smoke, dry-run)
        if: github.event_name == 'pull_request'
        run: python scripts/learn_monitor.py --dry-run

      - name: Run Learn Monitor (scheduled / manual)
        id: monitor
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          set +e
          python scripts/learn_monitor.py
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$EXIT_CODE" -eq 1 ]; then
            REPORT_FILE=$(ls -t reports/monitoring/learn-changes-*.md 2>/dev/null | head -1)
            if [ -n "$REPORT_FILE" ]; then
              echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Detect state changes
        if: github.event_name != 'pull_request'
        id: diff
        run: |
          if [ -n "$(git status --porcelain data/monitor-state.json reports/monitoring/ 2>/dev/null)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update PR with state updates
        if: github.event_name != 'pull_request' && steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Learn Monitor: update Microsoft Learn URL tracking"
          branch: monitoring/learn-url-${{ github.run_number }}
          delete-branch: true
          base: main
          title: "Learn Monitor: Microsoft Learn documentation update (${{ github.run_number }})"
          labels: |
            monitoring
            documentation
            automated
            learn-watch
          body: |
            ## Microsoft Learn URL Monitor

            Automated weekly check of Microsoft Learn URLs referenced by
            FSI-CopilotGov controls and playbooks.

            - Changes detected: `${{ steps.monitor.outputs.exit_code == '1' && 'yes' || 'no (weekly baseline refresh)' }}`
            - Report: `${{ steps.monitor.outputs.report_file }}`

            ### Files modified
            - `data/monitor-state.json` — updated content hashes
            - `reports/monitoring/learn-changes-*.md` — change report (if changes detected)

            Review the report, verify affected controls/playbooks, then merge to update
            the baseline.

            ---
            *Automated PR created by `.github/workflows/learn-url-monitor.yml`.*
